<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>LIVELINEMETA – Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{
      min-height:100vh;
      background:#ffffff;
      font-family:system-ui, sans-serif;
      display:flex;
      flex-direction:column;
      align-items:center;
    }
    .header{
      width:100%; max-width:900px; padding:15px 20px;
      display:flex; align-items:center; gap:15px;
      background:white;
    }
    .logo{
      width:65px; height:65px; border-radius:50%; 
      object-fit:cover; border:2px solid #1e3a8a;
    }
    .title{font-size:26px; font-weight:800; color:#000000;}

    .container{width:100%; max-width:420px; padding:20px 15px; margin-top:30px;}
    .card{
      background:white; border-radius:16px; padding:35px 25px;
      box-shadow:0 5px 20px rgba(0,0,0,0.08); border:2px solid #1e3a8a;
    }
    h1{text-align:center; color:#1e3a8a; margin-bottom:25px; font-size:26px;}
    
    .form-group{margin-bottom:18px; position:relative;}
    label{font-size:14px; font-weight:600; color:#000000; margin-bottom:6px; display:block;}
    input{
      width:100%; padding:14px 14px 14px 45px; border:1px solid #1e3a8a;
      border-radius:8px; font-size:15px; background:#f9fafb;
    }
    .icon{
      position:absolute; left:15px; top:38px; font-size:18px; color:#000000;
    }
    .eye{
      position:absolute; right:15px; top:38px; cursor:pointer; 
      font-weight:bold; color:#1e3a8a;
    }
    button{
      width:100%; padding:15px; background:#1e3a8a; color:white;
      border:none; border-radius:8px; font-size:16px; font-weight:700;
      margin-top:10px; cursor:pointer;
    }
    button:hover{background:#2563eb;}
    #message{text-align:center; margin:15px 0; font-weight:600; min-height:50px;}
    .forgot{text-align:right; margin-top:5px;}
    .forgot a{color:#1e3a8a; text-decoration:none;}
  </style>
</head>
<body>

<div class="header">
  <img src="assets/logo/livelinemeta.png" alt="Logo" class="logo">
  <h1 class="title">LIVELINEMETA</h1>
</div>

<div class="container">
  <div class="card">
    <h1>LOGIN</h1>
    
    <form id="loginForm">
      <div class="form-group">
        <label>Email Address</label>
        <span class="icon">✉️</span>
        <input type="email" id="loginEmail" placeholder="Enter Email" required>
      </div>

      <div class="form-group">
        <label>Password</label>
        <span class="icon">🔒</span>
        <input type="password" id="loginPassword" placeholder="Enter Password" required>
        <span class="eye" data-target="loginPassword">SHOW</span>
      </div>

      <div class="forgot">
        <a href="#">Forgot Password?</a>
      </div>

      <button type="submit">LOGIN NOW</button>
    </form>
    
    <div id="message"></div>

    <p style="text-align:center; margin-top:20px; font-size:15px;">
      Don't have an account? 
      <a href="register.html" style="color:#1e3a8a; font-weight:600;">Register Here</a>
    </p>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA3G2bMOJ_HSDYXJPuM70tVjfbkHlMftr4",
  authDomain: "livelinemeta.firebaseapp.com",
  projectId: "livelinemeta",
  storageBucket: "livelinemeta.appspot.com",
  messagingSenderId: "206900805598",
  appId: "1:206900805598:web:10e6b39100af201b4e674f"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// Password Show/Hide
document.querySelectorAll('.eye').forEach(icon => {
  icon.addEventListener('click', () => {
    const target = document.getElementById(icon.dataset.target);
    if (target.type === 'password') {
      target.type = 'text';
      icon.textContent = 'HIDE';
    } else {
      target.type = 'password';
      icon.textContent = 'SHOW';
    }
  });
});

document.getElementById("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  
  const message = document.getElementById("message");
  const email = document.getElementById("loginEmail").value.trim();
  const password = document.getElementById("loginPassword").value;

  message.style.color = "blue";
  message.textContent = "Logging in... Please wait";

  try {
    const userCredential = await auth.signInWithEmailAndPassword(email, password);
    const uid = userCredential.user.uid;

    const userDoc = await db.collection("users").doc(uid).get();
    
    if (userDoc.exists) {
      const data = userDoc.data();
      message.style.color = "green";
      message.innerHTML = `✅ Login Successful!<br>Welcome ${data.fullName || 'User'}`;

      setTimeout(() => {
        window.location.href = `dashboard.html?uid=${uid}`;
      }, 1800);
    }
  } catch (error) {
    console.error(error);
    message.style.color = "red";
    message.textContent = "❌ " + error.message;
  }
});
</script>

</body>
</html>
